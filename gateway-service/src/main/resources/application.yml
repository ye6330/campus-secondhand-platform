server:
  port: 9000

spring:
  application:
    name: campus-gateway-service
  main:
    web-application-type: reactive
  cloud:
    nacos:
      config:
        import-check:
          enabled: false
    gateway:
      default-filters:
        # user-service 和 gateway 都可能写入跨域响应头，这里去重，避免浏览器判定跨域失败
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - http://localhost:5173
              - http://127.0.0.1:5173
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders:
              - '*'
            allowCredentials: true
      routes:
        - id: user-service
          uri: ${USER_SERVICE_URL:http://localhost:9101}
          predicates:
            - Path=/api/users/**
        - id: product-service
          uri: ${PRODUCT_SERVICE_URL:http://localhost:9102}
          predicates:
            - Path=/api/products/**,/api/categories/**,/api/favorites/**,/api/comments/**,/api/reports/**
        - id: order-service
          uri: ${ORDER_SERVICE_URL:http://localhost:9103}
          predicates:
            - Path=/api/orders/**

management:
  endpoints:
    web:
      exposure:
        include: health,info
