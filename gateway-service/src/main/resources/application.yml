server:
  port: 9000

spring:
  application:
    name: campus-gateway-service
  main:
    web-application-type: reactive
  cloud:
    nacos:
      config:
        import-check:
          enabled: false
    gateway:
      default-filters:
        # user-service 和 gateway 都可能写入跨域响应头，这里去重，避免浏览器判定跨域失败
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - http://localhost:5173
              - http://127.0.0.1:5173
              - http://192.168.209.128
              - http://192.168.209.1
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders:
              - '*'
            allowCredentials: true
      routes:
        - id: user-service
          uri: lb://campus-user-service
          predicates:
            - Path=/api/users/**
        - id: admin-service
          uri: lb://campus-admin-service
          predicates:
            - Path=/api/reports/**,/api/operation-logs/**
        - id: product-service
          uri: lb://campus-product-service
          predicates:
            - Path=/api/products/**,/api/categories/**,/api/favorites/**,/api/comments/**
        - id: order-service
          uri: lb://campus-order-service
          predicates:
            - Path=/api/orders/**
        - id: message-service
          uri: lb://campus-message-service
          predicates:
            - Path=/api/messages/**,/api/notifications/**

management:
  endpoints:
    web:
      exposure:
        include: health,info
