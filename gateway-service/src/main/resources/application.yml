server:
  port: 9000

spring:
  cloud:
    nacos:
      config:
        import-check:
          enabled: false
  main:
    web-application-type: reactive
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: http://192.168.209.128:9101
          predicates:
            - Path=/api/users/**
        - id: product-service
          uri: http://192.168.209.128:9102
          predicates:
            - Path=/api/products/**,/api/categories/**,/api/favorites/**,/api/comments/**,/api/reports/**
        - id: order-service
          uri: http://192.168.209.128:9103
          predicates:
            - Path=/api/orders/**

management:
  endpoints:
    web:
      exposure:
        include: health,info
