version: "3.8"

networks:
  campus-net:
    driver: bridge

services:

  # ===== 基础中间件 =====

  mysql:
    image: mysql:8.0
    container_name: campus-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      TZ: Asia/Shanghai
    ports:
      - "${MYSQL_PORT}:3306"
    volumes:
      - /opt/campus/mysql/data:/var/lib/mysql
      - ../sql:/docker-entrypoint-initdb.d
      - ./mysql/my.cnf:/etc/mysql/conf.d/my.cnf
    networks:
      - campus-net

  redis:
    image: redis:7
    container_name: campus-redis
    restart: always
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - /opt/campus/redis/data:/data
    networks:
      - campus-net

  rabbitmq:
    image: rabbitmq:3-management
    container_name: campus-rabbitmq
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
    ports:
      - "${RABBITMQ_PORT}:5672"
      - "${RABBITMQ_CONSOLE_PORT}:15672"
    volumes:
      - /opt/campus/rabbitmq/data:/var/lib/rabbitmq
    networks:
      - campus-net

  nacos:
    image: nacos/nacos-server:2.2.3
    container_name: campus-nacos
    restart: always
    environment:
      MODE: standalone
      JVM_XMS: 256m
      JVM_XMX: 512m
      NACOS_AUTH_TOKEN: ${NACOS_AUTH_TOKEN}
    ports:
      - "${NACOS_PORT}:8848"
    volumes:
      - /opt/campus/nacos/logs:/home/nacos/logs
    networks:
      - campus-net

  # ===== 业务微服务 =====

  gateway-service:
    build:
      context: ../gateway-service
    image: campus-gateway-service:1.0.0
    container_name: campus-gateway-service
    restart: always
    ports:
      - "${GATEWAY_PORT}:9000"
    environment:
      - NACOS_ADDR=nacos:8848
    depends_on:
      - nacos
      - user-service
      - product-service
      - order-service
    networks:
      - campus-net

  user-service:
    build:
      context: ../user-service
    image: campus-user-service:1.0.0
    container_name: campus-user-service
    restart: always
    ports:
      - "${USER_SERVICE_PORT}:9101"
    environment:
      - NACOS_ADDR=nacos:8848
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=trade_user_db
      - DB_USERNAME=root
      - DB_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - REDIS_HOST=redis
      - RABBITMQ_HOST=rabbitmq
    depends_on:
      - mysql
      - redis
      - rabbitmq
      - nacos
    networks:
      - campus-net

  product-service:
    build:
      context: ../product-service
    image: campus-product-service:1.0.0
    container_name: campus-product-service
    restart: always
    ports:
      - "${PRODUCT_SERVICE_PORT}:9102"
    environment:
      - NACOS_ADDR=nacos:8848
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=trade_product_db
      - DB_USERNAME=root
      - DB_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - REDIS_HOST=redis
    depends_on:
      - mysql
      - redis
      - nacos
    networks:
      - campus-net

  order-service:
    build:
      context: ../order-service
    image: campus-order-service:1.0.0
    container_name: campus-order-service
    restart: always
    ports:
      - "${ORDER_SERVICE_PORT}:9103"
    environment:
      - NACOS_ADDR=nacos:8848
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=trade_order_db
      - DB_USERNAME=root
      - DB_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - REDIS_HOST=redis
      - RABBITMQ_HOST=rabbitmq
    depends_on:
      - mysql
      - redis
      - rabbitmq
      - nacos
    networks:
      - campus-net

  message-service:
    build:
      context: ../message-service
    image: campus-message-service:1.0.0
    container_name: campus-message-service
    restart: always
    ports:
      - "${MESSAGE_SERVICE_PORT}:9104"
    environment:
      - NACOS_ADDR=nacos:8848
      - RABBITMQ_HOST=rabbitmq
    depends_on:
      - rabbitmq
      - nacos
    networks:
      - campus-net

  admin-service:
    build:
      context: ../admin-service
    image: campus-admin-service:1.0.0
    container_name: campus-admin-service
    restart: always
    ports:
      - "${ADMIN_SERVICE_PORT}:9105"
    environment:
      - NACOS_ADDR=nacos:8848
    depends_on:
      - nacos
    networks:
      - campus-net

  # ===== 网关层 =====

  nginx:
    image: nginx:1.25
    container_name: campus-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ../frontend/dist:/usr/share/nginx/html
    depends_on:
      - gateway-service
    networks:
      - campus-net
